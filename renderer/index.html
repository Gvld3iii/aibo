<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Aibo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orb-color: #6C5DD3;
      --orb-glow:  #9b8fef;
      --orb-dark:  #3a2fa0;
      --orb-size:  56px;
      --surface:   #13132a;
      --surface2:  #1a1a35;
      --text:      #e0dff8;
      --text-muted:#7070a0;
      --border:    rgba(108,93,211,0.25);
      --font-ui:   'Segoe UI', sans-serif;
      --font-mono: 'Consolas', monospace;
    }

    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: transparent; color: var(--text);
      font-family: var(--font-ui); user-select: none; cursor: none;
    }

    #cursor {
      position: fixed; width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4); pointer-events: none;
      z-index: 9999; transform: translate(-50%,-50%);
    }

    /* ── ORB WRAP ── */
    #orb-wrap { position: fixed; z-index: 200; pointer-events: none; will-change: left,top; }
    #orb { width: var(--orb-size); height: var(--orb-size); border-radius: 50%; position: relative; pointer-events: all; cursor: grab; }
    #orb:active { cursor: grabbing; }

    /* ═══════════════════════════════════
       SKIN: BALL — Chrome Metallic
    ═══════════════════════════════════ */
    body[data-skin="ball"] .orb-core {
      width: 100%; height: 100%; border-radius: 50%;
      background:
        radial-gradient(circle at 28% 26%, rgba(255,255,255,1) 0%, rgba(255,255,255,0.6) 4%, transparent 18%),
        radial-gradient(circle at 68% 72%, rgba(255,255,255,0.2) 0%, transparent 16%),
        radial-gradient(circle at 38% 35%,
          var(--orb-glow) 0%,
          var(--orb-color) 35%,
          var(--orb-dark) 65%,
          rgba(0,0,0,0.95) 100%);
      position: relative; transform-origin: center;
      box-shadow:
        inset -5px -5px 14px rgba(0,0,0,0.7),
        inset 3px 3px 8px rgba(255,255,255,0.2),
        inset 0 0 20px rgba(0,0,0,0.3);
    }
    body[data-skin="ball"] .orb-shine {
      position: absolute; top: 12%; left: 16%;
      width: 40%; height: 26%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.5) 40%, transparent 75%);
      border-radius: 50%; opacity: 0.95; filter: blur(0.5px);
    }
    body[data-skin="ball"] .orb-glow-bg {
      position: absolute; inset: -22px; border-radius: 50%;
      background: radial-gradient(circle, var(--orb-color) 0%, transparent 70%);
      opacity: 0.28; z-index: -1; pointer-events: none;
    }
    body[data-skin="ball"] .orb-shadow {
      position: absolute; bottom: -12px; left: 50%;
      transform: translateX(-50%); width: 70%; height: 10px;
      background: var(--orb-color); border-radius: 50%;
      opacity: 0.2; filter: blur(8px);
    }
    body[data-skin="ball"] .spirit-layer { display: none; }

    /* ═══════════════════════════════════
       SKIN: SPIRIT — Plasma Energy
    ═══════════════════════════════════ */
    body[data-skin="spirit"] .orb-core {
      width: 100%; height: 100%; border-radius: 50%;
      background: transparent; position: relative; transform-origin: center;
    }
    body[data-skin="spirit"] .orb-shine  { display: none; }
    body[data-skin="spirit"] .orb-shadow { display: none; }
    body[data-skin="spirit"] .orb-glow-bg {
      position: absolute; inset: -32px; border-radius: 50%;
      background: radial-gradient(circle, var(--orb-color) 0%, var(--orb-glow) 30%, transparent 65%);
      opacity: 0.4; z-index: -1; pointer-events: none;
      animation: spirit-breathe 2.8s ease-in-out infinite;
    }
    .spirit-layer { position: absolute; border-radius: 50%; pointer-events: none; }
    .spirit-core {
      inset: 15%; border-radius: 50%;
      background: radial-gradient(circle, white 0%, var(--orb-glow) 35%, var(--orb-color) 65%, transparent 80%);
      opacity: 0.65; animation: spirit-core-pulse 2s ease-in-out infinite;
    }
    .spirit-ring1 { inset: -2px; border: 2px solid var(--orb-glow); opacity: 0; animation: spirit-ripple 2.2s ease-out infinite; }
    .spirit-ring2 { inset: -2px; border: 1px solid var(--orb-color); opacity: 0; animation: spirit-ripple 2.2s ease-out infinite 0.7s; }
    .spirit-ring3 { inset: -2px; border: 1px solid var(--orb-glow); opacity: 0; animation: spirit-ripple 2.2s ease-out infinite 1.4s; }
    .spirit-wisp1 { width:45%; height:45%; top:5%; left:20%; background: radial-gradient(circle, var(--orb-glow) 0%, transparent 70%); opacity:.45; animation:wisp-float1 3s ease-in-out infinite; filter:blur(3px); }
    .spirit-wisp2 { width:35%; height:35%; bottom:10%; right:15%; background: radial-gradient(circle, var(--orb-color) 0%, transparent 70%); opacity:.4; animation:wisp-float2 3.5s ease-in-out infinite; filter:blur(3px); }
    .spirit-wisp3 { width:25%; height:25%; top:30%; right:8%; background: radial-gradient(circle, white 0%, transparent 70%); opacity:.35; animation:wisp-float3 2.8s ease-in-out infinite; filter:blur(2px); }

    /* ── STATE ANIMATIONS ── */
    body[data-skin="ball"][data-state="idle"]     .orb-core { animation: breathe 3.5s ease-in-out infinite; }
    body[data-skin="ball"][data-state="thinking"] .orb-core { animation: thinking 1.5s linear infinite; }
    body[data-skin="ball"][data-state="thinking"] .orb-glow-bg { opacity: 0.5; animation: glow-pulse 0.8s ease-in-out infinite; }
    body[data-skin="ball"][data-state="speaking"] .orb-core { animation: speaking 0.4s ease-in-out infinite alternate; }
    body[data-skin="ball"][data-state="speaking"] .orb-glow-bg { opacity: 0.55; }
    body[data-skin="spirit"][data-state="idle"]     .orb-glow-bg { animation: spirit-breathe 2.8s ease-in-out infinite; }
    body[data-skin="spirit"][data-state="thinking"] .spirit-core { animation: spirit-think 0.6s linear infinite; }
    body[data-skin="spirit"][data-state="thinking"] .orb-glow-bg { opacity: 0.65; animation: spirit-breathe 0.6s ease-in-out infinite; }
    body[data-skin="spirit"][data-state="thinking"] .spirit-ring1 { animation: spirit-ripple 0.8s ease-out infinite; }
    body[data-skin="spirit"][data-state="thinking"] .spirit-ring2 { animation: spirit-ripple 0.8s ease-out infinite 0.26s; }
    body[data-skin="spirit"][data-state="thinking"] .spirit-ring3 { animation: spirit-ripple 0.8s ease-out infinite 0.52s; }
    body[data-skin="spirit"][data-state="speaking"] .spirit-core { animation: spirit-speak 0.3s ease-in-out infinite alternate; opacity: 0.95; }
    body[data-skin="spirit"][data-state="speaking"] .orb-glow-bg { opacity: 0.75; }

    @keyframes breathe           { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.06);opacity:1} }
    @keyframes thinking          { 0%{filter:hue-rotate(0deg) brightness(1)} 50%{filter:hue-rotate(45deg) brightness(1.35)} 100%{filter:hue-rotate(0deg) brightness(1)} }
    @keyframes speaking          { from{transform:scale(1)} to{transform:scale(1.1)} }
    @keyframes glow-pulse        { 0%,100%{opacity:.28} 50%{opacity:.58} }
    @keyframes spirit-breathe    { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.5;transform:scale(1.1)} }
    @keyframes spirit-ripple     { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(2.4);opacity:0} }
    @keyframes spirit-core-pulse { 0%,100%{opacity:.55;transform:scale(0.92)} 50%{opacity:.75;transform:scale(1.06)} }
    @keyframes spirit-think      { 0%{filter:hue-rotate(0deg) brightness(1.3)} 100%{filter:hue-rotate(90deg) brightness(1.7)} }
    @keyframes spirit-speak      { from{transform:scale(0.88);opacity:.6} to{transform:scale(1.18);opacity:1} }
    @keyframes wisp-float1       { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(4px,-3px) scale(1.12)} 66%{transform:translate(-3px,2px) scale(0.9)} }
    @keyframes wisp-float2       { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(-4px,3px) scale(1.12)} 70%{transform:translate(3px,-2px) scale(0.9)} }
    @keyframes wisp-float3       { 0%,100%{transform:translate(0,0)} 50%{transform:translate(2px,-4px)} }

    /* ═══════════════════════════════════
       SKIN: CUBE — Gunmetal Metallic
    ═══════════════════════════════════ */
    body[data-skin="cube"] .orb-core {
      width: 100%; height: 100%; border-radius: 0; position: relative;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 6%, transparent 18%),
        linear-gradient(145deg,
          #c8c8d8 0%,
          #8890a8 12%,
          var(--orb-glow) 25%,
          var(--orb-color) 48%,
          #1a1a2e 72%,
          #0a0a14 100%);
      box-shadow:
        inset -6px -8px 16px rgba(0,0,0,0.85),
        inset 5px 5px 12px rgba(255,255,255,0.25),
        inset 0 0 24px rgba(0,0,0,0.4);
      animation: cube-float 6s ease-in-out infinite;
      filter: drop-shadow(0 0 6px var(--orb-color));
    }
    body[data-skin="cube"] .orb-shine {
      position: absolute; top: 6%; left: 28%;
      width: 35%; height: 20%;
      background: linear-gradient(140deg, rgba(255,255,255,0.98) 0%, rgba(200,210,255,0.6) 40%, transparent 70%);
      opacity: 0.85; filter: blur(0.5px);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    body[data-skin="cube"] .spirit-layer { display: none; }
    body[data-skin="cube"] .orb-glow-bg {
      position: absolute; inset: -20px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: var(--orb-color); opacity: 0.22;
      z-index: -1; filter: blur(14px);
    }
    body[data-skin="cube"] .orb-shadow {
      position: absolute; bottom: -14px; left: 50%;
      transform: translateX(-50%); width: 75%; height: 8px;
      background: var(--orb-color); opacity: 0.18; filter: blur(10px);
    }
    body[data-skin="cube"][data-state="idle"]     .orb-core { animation: cube-float 6s ease-in-out infinite; }
    body[data-skin="cube"][data-state="thinking"] .orb-core { animation: cube-spin 1.2s linear infinite; filter: brightness(1.5) saturate(1.3) drop-shadow(0 0 10px var(--orb-glow)); }
    body[data-skin="cube"][data-state="speaking"] .orb-core { animation: cube-spin 0.5s linear infinite; filter: brightness(1.8) drop-shadow(0 0 16px var(--orb-glow)); }
    @keyframes cube-float { 0%,100%{transform:rotate(0deg) scale(1)} 25%{transform:rotate(10deg) scale(1.05)} 75%{transform:rotate(-8deg) scale(0.97)} }
    @keyframes cube-spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* ═══════════════════════════════════
       SKIN: TETRA — Molten Metal Pyramid
    ═══════════════════════════════════ */
    body[data-skin="tetra"] .orb-core {
      width: 100%; height: 100%; border-radius: 0; position: relative;
      clip-path: polygon(50% 2%, 98% 92%, 2% 92%);
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 5%, transparent 14%),
        linear-gradient(170deg,
          #e8d5b0 0%,
          #c8a060 8%,
          var(--orb-glow) 18%,
          var(--orb-color) 50%,
          #1a0a00 78%,
          #0a0500 100%);
      box-shadow:
        inset -4px -10px 18px rgba(0,0,0,0.9),
        inset 3px 2px 8px rgba(255,220,140,0.3),
        inset 0 0 20px rgba(0,0,0,0.5);
      animation: tetra-float 5s ease-in-out infinite;
      filter: drop-shadow(0 0 8px var(--orb-color));
    }
    body[data-skin="tetra"] .orb-shine {
      position: absolute; top: 4%; left: 38%;
      width: 16%; height: 32%;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,220,140,0.5) 50%, transparent 100%);
      opacity: 0.9; filter: blur(0.5px);
    }
    body[data-skin="tetra"] .spirit-layer { display: none; }
    body[data-skin="tetra"] .orb-glow-bg {
      position: absolute; inset: -16px;
      background: radial-gradient(ellipse at 50% 85%, var(--orb-color) 0%, transparent 60%);
      opacity: 0.28; z-index: -1; filter: blur(14px);
    }
    body[data-skin="tetra"] .orb-shadow {
      position: absolute; bottom: 4%; left: 50%;
      transform: translateX(-50%); width: 85%; height: 6px;
      background: var(--orb-color); opacity: 0.22; filter: blur(8px);
    }
    body[data-skin="tetra"][data-state="idle"]     .orb-core { animation: tetra-float 5s ease-in-out infinite; }
    body[data-skin="tetra"][data-state="thinking"] .orb-core { animation: tetra-spin 1.6s ease-in-out infinite; filter: brightness(1.5) drop-shadow(0 0 12px var(--orb-glow)); }
    body[data-skin="tetra"][data-state="speaking"] .orb-core { animation: tetra-float 0.35s ease-in-out infinite; filter: brightness(1.8) saturate(1.5); }
    @keyframes tetra-float { 0%,100%{transform:scale(1) rotate(0deg)} 33%{transform:scale(1.06) rotate(4deg)} 66%{transform:scale(0.97) rotate(-3deg)} }
    @keyframes tetra-spin  { 0%,100%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.12)} }

    /* ═══════════════════════════════════
       SKIN: DIAMOND — Ice Crystal
    ═══════════════════════════════════ */
    body[data-skin="diamond"] .orb-core {
      width: 100%; height: 100%; border-radius: 0;
      clip-path: polygon(50% 0%, 100% 42%, 78% 100%, 22% 100%, 0% 42%);
      background:
        radial-gradient(circle at 35% 20%, rgba(255,255,255,1) 0%, rgba(220,240,255,0.7) 8%, transparent 22%),
        radial-gradient(circle at 65% 70%, rgba(255,255,255,0.3) 0%, transparent 15%),
        linear-gradient(130deg,
          #d0e8ff 0%,
          #a0c8f0 10%,
          var(--orb-glow) 22%,
          var(--orb-color) 42%,
          rgba(200,230,255,0.15) 58%,
          var(--orb-dark) 72%,
          rgba(0,0,30,0.95) 100%);
      position: relative;
      box-shadow:
        inset -5px -6px 16px rgba(0,0,60,0.8),
        inset 4px 4px 10px rgba(180,220,255,0.4),
        inset 0 0 20px rgba(100,160,255,0.1);
      animation: diamond-float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px var(--orb-glow));
    }
    body[data-skin="diamond"] .orb-shine {
      position: absolute; top: 4%; left: 22%;
      width: 38%; height: 28%;
      background: radial-gradient(ellipse, rgba(255,255,255,1) 0%, rgba(200,230,255,0.7) 45%, transparent 75%);
      opacity: 0.92; filter: blur(0.5px);
      clip-path: polygon(50% 0%, 100% 42%, 78% 100%, 22% 100%, 0% 42%);
    }
    body[data-skin="diamond"] .spirit-layer { display: none; }
    body[data-skin="diamond"] .orb-glow-bg {
      position: absolute; inset: -20px;
      clip-path: polygon(50% 0%, 100% 42%, 78% 100%, 22% 100%, 0% 42%);
      background: var(--orb-glow); opacity: 0.25;
      z-index: -1; filter: blur(16px);
      animation: diamond-float 4s ease-in-out infinite;
    }
    body[data-skin="diamond"] .orb-shadow {
      position: absolute; bottom: -10px; left: 50%;
      transform: translateX(-50%); width: 65%; height: 6px;
      background: var(--orb-color); opacity: 0.2; filter: blur(8px);
    }
    body[data-skin="diamond"][data-state="idle"]     .orb-core { animation: diamond-float 4s ease-in-out infinite; }
    body[data-skin="diamond"][data-state="thinking"] .orb-core { animation: diamond-spin 1s linear infinite; filter: brightness(1.6) saturate(1.5) drop-shadow(0 0 14px var(--orb-glow)); }
    body[data-skin="diamond"][data-state="speaking"] .orb-core { animation: diamond-spin 0.4s linear infinite; filter: brightness(2) saturate(1.8); }
    @keyframes diamond-float { 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.07) rotate(7deg)} }
    @keyframes diamond-spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* ═══════════════════════════════════
       SKIN: TORUS — Polished Steel Ring
    ═══════════════════════════════════ */
    body[data-skin="torus"] .orb-core {
      width: 100%; height: 100%; border-radius: 50%;
      background: transparent; position: relative;
      border: 12px solid var(--orb-color);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 0 0 13px rgba(0,0,0,0.3),
        0 0 28px var(--orb-color),
        0 0 50px rgba(108,93,211,0.2),
        inset 0 4px 8px rgba(255,255,255,0.25),
        inset 0 -4px 8px rgba(0,0,0,0.6);
      animation: torus-float 4s ease-in-out infinite;
    }
    body[data-skin="torus"] .orb-shine {
      position: absolute; top: 6%; left: 50%;
      transform: translateX(-50%);
      width: 45%; height: 14%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
      border-radius: 50%; opacity: 0.75; filter: blur(0.5px);
    }
    body[data-skin="torus"] .spirit-layer { display: none; }
    body[data-skin="torus"] .orb-glow-bg {
      position: absolute; inset: -24px; border-radius: 50%;
      background: radial-gradient(circle, transparent 30%, var(--orb-color) 42%, var(--orb-glow) 50%, transparent 60%);
      opacity: 0.4; z-index: -1;
      animation: torus-float 4s ease-in-out infinite;
    }
    body[data-skin="torus"] .orb-shadow {
      position: absolute; bottom: -14px; left: 50%;
      transform: translateX(-50%); width: 80%; height: 6px;
      background: var(--orb-color); opacity: 0.18; filter: blur(10px);
      border-radius: 50%;
    }
    body[data-skin="torus"][data-state="idle"]     .orb-core { animation: torus-float 4s ease-in-out infinite; }
    body[data-skin="torus"][data-state="thinking"] .orb-core { animation: torus-spin 0.8s linear infinite; box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 0 35px var(--orb-glow), inset 0 4px 8px rgba(255,255,255,0.3); }
    body[data-skin="torus"][data-state="speaking"] .orb-core { animation: torus-spin 0.3s linear infinite; filter: brightness(1.6); box-shadow: 0 0 0 1px rgba(255,255,255,0.3), 0 0 50px var(--orb-glow); }
    @keyframes torus-float { 0%,100%{transform:scale(1) rotateX(0deg)} 50%{transform:scale(1.06) rotateX(14deg)} }
    @keyframes torus-spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }


    /* ── TRAIL ── */
    .trail-dot { position: fixed; border-radius: 50%; pointer-events: none; z-index: 90; transform: translate(-50%,-50%); background: var(--orb-glow); }

    /* ── SMALL BUBBLE ── */
    #bubble {
      position: fixed; z-index: 300; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 9px 14px; font-family: var(--font-mono); font-size: 12px;
      color: var(--orb-glow); max-width: 240px; line-height: 1.5;
      pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
    }
    #bubble.show { opacity: 1; }
    #bubble::after { content: ''; position: absolute; bottom: -6px; left: 18px; width: 10px; height: 10px; background: var(--surface); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transform: rotate(45deg); }

    /* ── RESPONSE BUBBLE ── */
    #response-bubble {
      position: fixed; z-index: 350; width: 320px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      opacity: 0; pointer-events: none;
      transform: scale(0.92) translateY(8px);
      transition: opacity .22s, transform .22s cubic-bezier(0.34,1.4,0.64,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #response-bubble.show { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
    #response-bubble-bar { height: 2px; width: 100%; background: var(--orb-color); opacity: 0.6; }
    #response-bubble-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 1px solid var(--border); }
    #response-bubble-title { font-size: 12px; font-family: var(--font-mono); color: var(--orb-glow); letter-spacing: 1px; text-transform: uppercase; }
    #response-bubble-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: all .15s; }
    #response-bubble-close:hover { background: rgba(255,255,255,.08); color: var(--text); }
    #response-bubble-body { padding: 12px 14px; font-size: 13px; line-height: 1.7; color: var(--text); max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    #response-bubble-footer { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 10px; border-top: 1px solid var(--border); }
    #response-bubble-source { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    #response-bubble-copy { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all .15s; }
    #response-bubble-copy:hover { border-color: var(--orb-color); color: var(--orb-glow); }

    .typing-cursor { display: inline-block; width: 2px; height: 14px; background: var(--orb-glow); margin-left: 2px; vertical-align: middle; animation: blink .7s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── WAKE ANIMATIONS ── */
    .wake-ring {
      position: fixed; border-radius: 50%;
      border: 2px solid var(--orb-glow);
      pointer-events: none; z-index: 199;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
    .wake-particle {
      position: fixed; width: 6px; height: 6px;
      border-radius: 50%; background: var(--orb-glow);
      pointer-events: none; z-index: 199;
      transform: translate(-50%, -50%);
    }
    #wake-shockwave {
      position: fixed; inset: 0; z-index: 198;
      pointer-events: none; opacity: 0; border-radius: 0;
      background: radial-gradient(circle at 50% 50%, rgba(108,93,211,0.18) 0%, transparent 65%);
      transform: scale(0);
    }
    @keyframes wake-ring-burst {
      0%   { transform: translate(-50%,-50%) scale(0.2); opacity: 0.9; }
      100% { transform: translate(-50%,-50%) scale(var(--ring-scale, 4)); opacity: 0; }
    }
    @keyframes wake-particle-fly {

  <!-- Chat bubble — floats above orb -->

  <div id="ai-modal">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <span class="modal-title" id="modal-title">Aibo</span>

      <div class="modal-body">
        <div class="modal-response" id="modal-response">
          <div class="modal-loading">

            <span>Thinking...</span>

        <button class="modal-action" id="modal-copy">Copy</button>
        <button class="modal-action primary" id="modal-done">Done</button>
      </div>

  </div>

  <script>
    // ── ELEMENTS ──
    const orbWrap    = document.getElementById('orb-wrap')
    const orbEl      = document.getElementById('orb')
    const orbCore    = orbEl.querySelector('.orb-core')
    const orbShadow  = orbEl.querySelector('.orb-shadow')
    const cursorEl   = document.getElementById('cursor')
    const panel      = document.getElementById('panel')
    const freezeBtn  = document.getElementById('freeze-btn')
    const badge      = document.getElementById('status-badge')
    const bubbleEl   = document.getElementById('bubble')
    const selToolbar = document.getElementById('sel-toolbar')
    const aiModal    = document.getElementById('ai-modal')
    const modalTitle = document.getElementById('modal-title')
    const modalModel = document.getElementById('modal-model')
    const modalSel   = document.getElementById('modal-selection')
    const modalResp  = document.getElementById('modal-response')
    const respBubble      = document.getElementById('response-bubble')
    const respBubbleBody  = document.getElementById('response-bubble-body')
    const respBubbleTitle = document.getElementById('response-bubble-title')
    const respBubbleSrc   = document.getElementById('response-bubble-source')

    // ── STATE ──
    let W = window.innerWidth, H = window.innerHeight
    let ORB_SIZE = 56
    let ox = W/2 - ORB_SIZE/2, oy = H/2 - ORB_SIZE/2
    let vx = 0, vy = 0, mx = W/2, my = H/2
    let orbitAngle = 0, orbitR = 40, speed = 8
    let roamMode = true, trailOn = true
    let frozen = false, panelOpen = false, modalOpen = false, respBubbleOpen = false
    let isDragging = false, dragOffX = 0, dragOffY = 0
    let clickStartX = 0, clickStartY = 0
    let squishX = 1, squishY = 1
    let lastSelection = ''
    let idleTimer = null
    let toolbarTimeout = null, toolbarDismiss = 5
    let responseBubbleTimer = null, responseBubbleDismiss = 8
    let currentSkin = 'ball'

    // ── TRAIL ──
    const TRAIL_N = 12
    const trail = []
    for (let i = 0; i < TRAIL_N; i++) {
      const d = document.createElement('div')
      d.className = 'trail-dot'
      d.style.display = 'none'
      document.body.appendChild(d)
      trail.push({ el: d, x: ox, y: oy, life: 0 })
    }
    let trailHead = 0, trailTick = 0

    function lerp(a, b, t) { return a + (b-a)*t }

    // ── PHYSICS ──
    function tick() {
      W = window.innerWidth; H = window.innerHeight
      const PAD = 8

      if (!isDragging && roamMode && !frozen) {
        orbitAngle += 0.016

        // Autonomous roam — drift toward random target when idle
        let tx, ty
        if (autoRoamActive) {
          tx = autoRoamTarget.x - ORB_SIZE/2
          ty = autoRoamTarget.y - ORB_SIZE/2
          const stiff = 0.0008, damp = 0.96  // very slow, dreamy movement
          vx = (vx + (tx - ox) * stiff) * damp
          vy = (vy + (ty - oy) * stiff) * damp
        } else {
          tx = mx + Math.cos(orbitAngle) * orbitR - ORB_SIZE/2
          ty = my + Math.sin(orbitAngle * 0.72) * orbitR - ORB_SIZE/2
          const stiff = speed * 0.0028, damp = 0.80
          vx = (vx + (tx - ox) * stiff) * damp
          vy = (vy + (ty - oy) * stiff) * damp
        }

        ox += vx; oy += vy
        if (ox < PAD)                { ox = PAD;                vx *= -0.45 }
        if (ox > W - ORB_SIZE - PAD) { ox = W - ORB_SIZE - PAD; vx *= -0.45 }
        if (oy < PAD)                { oy = PAD;                vy *= -0.45 }
        if (oy > H - ORB_SIZE - PAD) { oy = H - ORB_SIZE - PAD; vy *= -0.45 }
        const spd = Math.sqrt(vx*vx + vy*vy)
        const sq  = Math.min(spd * 0.045, 0.28)
        const ang = Math.atan2(vy, vx)
        squishX = lerp(squishX, 1 + sq * Math.abs(Math.cos(ang)), 0.18)
        squishY = lerp(squishY, 1 - sq * 0.6, 0.18)
      } else if (isDragging) {
        ox = mx - dragOffX; oy = my - dragOffY
        vx = vy = 0
        squishX = lerp(squishX, 1, 0.3)
        squishY = lerp(squishY, 1, 0.3)
      } else {
        // Frozen or not roaming — kill velocity completely
        vx = 0; vy = 0
        squishX = lerp(squishX, 1, 0.12)
        squishY = lerp(squishY, 1, 0.12)
      }

      orbWrap.style.left = Math.round(ox) + 'px'
      orbWrap.style.top  = Math.round(oy) + 'px'

      // Only apply squish in ball mode — spirit floats freely
      if (currentSkin === 'ball') {
        orbCore.style.transform = `scaleX(${squishX.toFixed(3)}) scaleY(${squishY.toFixed(3)})`
        const spd2 = Math.sqrt(vx*vx + vy*vy)
        orbShadow.style.opacity = Math.min(0.06 + spd2*0.012, 0.22).toFixed(3)
      } else {
        orbCore.style.transform = ''
      }

      trailTick++
      if (trailTick % 3 === 0) spawnTrail()
      updateTrail()
      if (panelOpen) positionPanel()
      if (respBubbleOpen) positionResponseBubble()
      if (taskPanelOpen) positionTaskPanel()
      if (chatOpen) positionChatBubble()
      if (knowledgePanelOpen) positionKnowledgePanel()
      requestAnimationFrame(tick)
    }

    function spawnTrail() {
      if (!trailOn) return
      const t = trail[trailHead % TRAIL_N]
      t.x = ox + ORB_SIZE/2; t.y = oy + ORB_SIZE/2; t.life = 1
      t.el.style.display = 'block'
      trailHead++
    }

    function updateTrail() {
      const isSpirit = currentSkin === 'spirit'
      trail.forEach(t => {
        if (t.life <= 0) { t.el.style.display = 'none'; return }
        t.life -= isSpirit ? 0.03 : 0.055  // spirit trails linger longer
        const sz = ORB_SIZE * (isSpirit ? 0.6 : 0.45) * t.life
        t.el.style.width   = sz + 'px'
        t.el.style.height  = sz + 'px'
        t.el.style.left    = t.x + 'px'
        t.el.style.top     = t.y + 'px'
        t.el.style.opacity = (t.life * (isSpirit ? 0.2 : 0.32)).toFixed(3)
        t.el.style.filter  = isSpirit ? `blur(${(3 * t.life).toFixed(1)}px)` : 'none'
        if (t.life <= 0) t.el.style.display = 'none'
      })
    }

    // ── SKIN ──
    function setSkin(skin) {
      currentSkin = skin
      document.body.setAttribute('data-skin', skin)
      document.querySelectorAll('.skin-btn').forEach(b => b.classList.toggle('active', b.dataset.skin === skin))
      // Spirit trails are blurry and linger — ball trails are crisp and quick
    }

    // ── PANEL ──
    function positionPanel() {
      const pw = 300, ph = panel.offsetHeight || 420
      let px = ox + ORB_SIZE + 14
      let py = oy + ORB_SIZE/2 - ph/2
      if (px + pw > W - 10) px = ox - pw - 14
      if (py < 10) py = 10
      if (py + ph > H - 10) py = H - ph - 10
      panel.style.left = Math.round(px) + 'px'
      panel.style.top  = Math.round(py) + 'px'
    }

    function openPanel() {
      panelOpen = true
      panel.classList.add('visible')
      positionPanel()
      setFrozen(true)
      window.aibo.setIgnoreMouse(false)
    }

    function closePanel() {
      panelOpen = false
      panel.classList.remove('visible')
      setFrozen(false)
      updatePassthrough()
    }

    function setFrozen(val) {
      frozen = val
      if (frozen) {
        // Fully stop all movement
        vx = 0; vy = 0
        orbitAngle = 0
        stopAutoRoam()
        freezeBtn.textContent = '▶ RESUME'
        freezeBtn.style.background  = 'rgba(216,90,48,0.25)'
        freezeBtn.style.borderColor = 'rgba(216,90,48,0.5)'
        freezeBtn.style.color       = '#f09b7a'
        badge.textContent = 'FROZEN'
      } else {
        freezeBtn.textContent = '⏸ FREEZE'
        freezeBtn.style.background  = 'rgba(108,93,211,0.18)'
        freezeBtn.style.borderColor = 'var(--border)'
        freezeBtn.style.color       = 'var(--orb-glow)'
        badge.textContent = 'IDLE'
      }
    }

    function updatePassthrough() {
      const needsMouse = panelOpen || modalOpen || respBubbleOpen
        || selToolbar.classList.contains('show')
        || taskPanelOpen || chatOpen || knowledgePanelOpen
      window.aibo.setIgnoreMouse(!needsMouse)
    }

    function setState(s) {
      document.body.setAttribute('data-state', s)
      if (!panelOpen) badge.textContent = s.toUpperCase()
    }

    // ── BUBBLES ──
    function showBubble(text, duration = 3000) {
      bubbleEl.textContent = text
      const bx = ox + ORB_SIZE + 14
      bubbleEl.style.left = (bx > W - 250 ? ox - 250 : bx) + 'px'
      bubbleEl.style.top  = (oy - 10) + 'px'
      bubbleEl.classList.add('show')
      clearTimeout(bubbleEl._t)
      bubbleEl._t = setTimeout(() => bubbleEl.classList.remove('show'), duration)
    }

    // ── AUTONOMOUS PERSONALITY ────────────────────────────────────────────
    // Aibo has moods, wanders with purpose, speaks unprompted

    const MOODS = {
      curious:    { speed: 0.0012, orbitR: 60,  glow: 0.45, label: 'curious'    },
      focused:    { speed: 0.0006, orbitR: 20,  glow: 0.25, label: 'focused'    },
      playful:    { speed: 0.0020, orbitR: 80,  glow: 0.55, label: 'playful'    },
      bored:      { speed: 0.0004, orbitR: 10,  glow: 0.15, label: 'bored'      },
      alert:      { speed: 0.0018, orbitR: 50,  glow: 0.60, label: 'alert'      },
    }

    let currentMood     = 'curious'
    let autoRoamActive  = false
    let autoRoamTarget  = { x: W/2, y: H/2 }
    let autoRoamTimer   = null
    let autoRoamMoveTimer = null
    let moodTimer       = null
    let lastSpokenTime  = 0

    // Mood-based unprompted thoughts
    const moodThoughts = {
      curious:  [
        'What are you working on?',
        'Interesting... tell me more.',
        'I noticed something — want me to look into it?',
        'This looks complex. Need help?',
        'I\'m picking up a lot of activity here.',
      ],
      playful:  [
        'Bet I can find that faster than you.',
        'You know I can do that for you, right?',
        'Try me — what do you need?',
        'I\'m bored. Give me something to do.',
        'Still here. Still faster than Google.',
      ],
      bored:    [
        '...',
        'Still here.',
        'Whenever you\'re ready.',
        'I could reorganize your files while I wait.',
        'Just sitting here thinking about AI things.',
      ],
      focused:  [
        'I\'ll stay quiet. You\'re in the zone.',
        'Focused mode. I\'m watching.',
        'Not interrupting. Just here.',
      ],
      alert:    [
        'Something caught my attention.',
        'Heads up — I noticed something.',
        'You might want to look at this.',
        'Alert. Something changed.',
      ],
    }

    function getRandomThought() {
      const thoughts = moodThoughts[currentMood] || moodThoughts.curious
      return thoughts[Math.floor(Math.random() * thoughts.length)]
    }

    function setMood(mood) {
      if (!MOODS[mood]) return
      currentMood = mood
      console.log('[Aibo] Mood:', mood)

      // Adjust glow based on mood
      const m = MOODS[mood]
      document.documentElement.style.setProperty(
        '--orb-glow-opacity', m.glow.toString()
      )
    }

    function shiftMoodNaturally() {
      const hour = new Date().getHours()
      const roll = Math.random()

      // Time-based mood tendencies
      if (hour >= 22 || hour < 6) {
        setMood(roll < 0.6 ? 'bored' : 'focused')
      } else if (hour >= 9 && hour < 17) {
        if (roll < 0.35)      setMood('focused')
        else if (roll < 0.65) setMood('curious')
        else if (roll < 0.85) setMood('alert')
        else                  setMood('playful')
      } else {
        if (roll < 0.4)       setMood('curious')
        else if (roll < 0.7)  setMood('playful')
        else                  setMood('bored')
      }

      // Shift mood again in 2-5 minutes
      clearTimeout(moodTimer)
      moodTimer = setTimeout(shiftMoodNaturally, (120 + Math.random() * 180) * 1000)
    }

    function pickRoamTarget() {
      const mood = MOODS[currentMood]
      const pad  = 100
      // Playful mood = bigger jumps, focused = stays near center
      const range = currentMood === 'focused' ? 0.3 : currentMood === 'playful' ? 1.0 : 0.7
      const cx = W / 2, cy = H / 2
      autoRoamTarget = {
        x: cx + (Math.random() - 0.5) * W * range,
        y: cy + (Math.random() - 0.5) * H * range,
      }
      // Clamp to screen
      autoRoamTarget.x = Math.max(pad, Math.min(W - pad, autoRoamTarget.x))
      autoRoamTarget.y = Math.max(pad, Math.min(H - pad, autoRoamTarget.y))
    }

    function startAutoRoam() {
      if (autoRoamActive || panelOpen || taskPanelOpen || modalOpen) return
      autoRoamActive = true
      pickRoamTarget()
      console.log('[Aibo] Autonomous roam started — mood:', currentMood)

      // Move to new target every 4-10 seconds based on mood
      const interval = currentMood === 'playful' ? 3000
                     : currentMood === 'bored'   ? 10000
                     : currentMood === 'alert'   ? 2000
                     : 5000 + Math.random() * 3000

      autoRoamMoveTimer = setInterval(() => {
        if (!autoRoamActive) { clearInterval(autoRoamMoveTimer); return }
        pickRoamTarget()

        // Occasionally speak unprompted based on mood
        const now = Date.now()
        const timeSinceSpoke = now - lastSpokenTime
        const shouldSpeak = timeSinceSpoke > 60000 && Math.random() < 0.15

        if (shouldSpeak) {
          const thought = getRandomThought()
          showBubble(thought, 4000)
          window.aibo.speak(thought)
          lastSpokenTime = now
        }
      }, interval)
    }

    function stopAutoRoam() {
      if (!autoRoamActive) return
      autoRoamActive = false
      clearInterval(autoRoamMoveTimer)
      clearTimeout(autoRoamTimer)
    }

    function resetIdleTimer() {
      stopAutoRoam()
      clearTimeout(idleTimer)
      idleTimer = setTimeout(() => {
        if (document.body.dataset.state === 'idle') {
          // Show a mood-appropriate thought
          const thought = getRandomThought()
          showBubble(thought, 4000)
          // Start roaming after 5 more seconds
          setTimeout(startAutoRoam, 5000)
        }
      }, 20000) // 20 seconds of inactivity before roaming
    }

    // Start with curious mood, shift naturally over time
    setMood('curious')
    setTimeout(shiftMoodNaturally, 120000) // first shift after 2 min

    // ── RESPONSE BUBBLE ──
    function positionResponseBubble() {
      const bw = 320, bh = respBubble.offsetHeight || 180
      let bx = ox + ORB_SIZE + 14
      let by = oy + ORB_SIZE/2 - bh/2
      if (bx + bw > W - 10) bx = ox - bw - 14
      if (by < 10) by = 10
      if (by + bh > H - 10) by = H - bh - 10
      respBubble.style.left = Math.round(bx) + 'px'
      respBubble.style.top  = Math.round(by) + 'px'
    }

    function showResponseBubble(title, text, source) {
      respBubbleTitle.textContent = title
      respBubbleSrc.textContent   = source || ''
      respBubbleBody.innerHTML    = ''
      respBubbleOpen = true
      respBubble.classList.add('show')
      positionResponseBubble()
      updatePassthrough()
      typeText(respBubbleBody, text)

      // Auto dismiss countdown
      clearTimeout(responseBubbleTimer)
      const bar = document.getElementById('response-bubble-bar')
      if (bar) {
        bar.style.transition = 'none'
        bar.style.width = '100%'
        bar.offsetHeight
        bar.style.transition = `width ${responseBubbleDismiss}s linear`
        bar.style.width = '0%'
      }
      responseBubbleTimer = setTimeout(hideResponseBubble, responseBubbleDismiss * 1000)
    }

    function hideResponseBubble() {
      clearTimeout(responseBubbleTimer)
      respBubbleOpen = false
      respBubble.classList.remove('show')

    function typeText(el, text, speed = 16) {
      el.innerHTML = '<span class="typing-cursor"></span>'
      let i = 0
      const cursor = el.querySelector('.typing-cursor')
      const iv = setInterval(() => {
        if (i < text.length) {
          cursor.insertAdjacentText('beforebegin', text[i++])
          el.scrollTop = el.scrollHeight
        } else {
          cursor.remove()
          clearInterval(iv)
        }
      }, speed)
    }

    function getTimeGreeting() {
      const h = new Date().getHours()
      if (h >= 5  && h < 12) return 'morning'
      if (h >= 12 && h < 17) return 'afternoon'
      if (h >= 17 && h < 21) return 'evening'
      return 'night'
    }

    // ── WAKE ANIMATIONS ───────────────────────────────────────────────────
    const wakeStyles = ['burst', 'materialize', 'powerup', 'shockwave']
    let lastWake = -1

    function playWakeAnimation() {
      // Pick random style — never repeat same one twice in a row
      let pick
      do { pick = Math.floor(Math.random() * wakeStyles.length) } while (pick === lastWake)
      lastWake = pick
      const style = wakeStyles[pick]

      const cx = ox + ORB_SIZE / 2
      const cy = oy + ORB_SIZE / 2

      if (style === 'burst')       wakeBurst(cx, cy)
      if (style === 'materialize') wakeMaterialize()
      if (style === 'powerup')     wakePowerup()
      if (style === 'shockwave')   wakeShockwave(cx, cy)
    }

    // 1 — Energy burst: rings explode outward
    function wakeBurst(cx, cy) {
      const scales = [2.5, 4, 6]
      const delays = [0, 120, 240]
      scales.forEach((scale, i) => {
        const ring = document.createElement('div')
        ring.className = 'wake-ring'
        ring.style.cssText = `
          left:${cx}px; top:${cy}px;
          width:${ORB_SIZE}px; height:${ORB_SIZE}px;
          --ring-scale:${scale};
          animation: wake-ring-burst ${0.6 + i * 0.15}s ease-out ${delays[i]}ms forwards;
        `
        document.body.appendChild(ring)
        setTimeout(() => ring.remove(), 1000 + delays[i])
      })

      // Shoot 8 particles outward
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2
        const dist  = 60 + Math.random() * 40
        const px    = Math.cos(angle) * dist
        const py    = Math.sin(angle) * dist
        const p     = document.createElement('div')
        p.className = 'wake-particle'
        p.style.cssText = `
          left:${cx}px; top:${cy}px;
          --px:${px}px; --py:${py}px;
          width:${4 + Math.random() * 4}px;
          height:${4 + Math.random() * 4}px;
          animation: wake-particle-fly ${0.5 + Math.random() * 0.3}s ease-out forwards;
        `
        document.body.appendChild(p)
        setTimeout(() => p.remove(), 900)
      }
    }

    // 2 — Materialize: orb fades in from nothing
    function wakeMaterialize() {
      orbWrap.style.animation = 'none'
      orbWrap.style.opacity   = '0'
      orbWrap.style.transform = 'scale(0.05)'
      orbWrap.offsetHeight    // force reflow
      orbWrap.style.transition = 'none'
      orbWrap.style.animation  = 'wake-materialize 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards'
      setTimeout(() => {
        orbWrap.style.animation  = ''
        orbWrap.style.opacity    = ''
        orbWrap.style.transform  = ''
      }, 750)
    }

    // 3 — Power up: grows from tiny with brightness flash
    function wakePowerup() {
      orbCore.style.animation = 'wake-powerup 0.65s cubic-bezier(0.34,1.4,0.64,1) forwards'
      setTimeout(() => { orbCore.style.animation = '' }, 700)
    }

    // 4 — Shockwave: ripple across whole screen from orb center
    function wakeShockwave(cx, cy) {
      const sw = document.getElementById('wake-shockwave')
      const xPct = ((cx / W) * 100).toFixed(1) + '%'
      const yPct = ((cy / H) * 100).toFixed(1) + '%'
      sw.style.background = `radial-gradient(circle at ${xPct} ${yPct}, rgba(108,93,211,0.22) 0%, transparent 60%)`
      sw.style.animation  = 'none'
      sw.offsetHeight
      sw.style.animation  = 'wake-shockwave 0.7s ease-out forwards'
      setTimeout(() => { sw.style.animation = '' }, 750)

      // Plus a burst from center
      wakeBurst(cx, cy)
    }

    // ── OLLAMA ──
    async function runOllama(mode, text) {
      console.log('[Aibo] runOllama — mode:', mode)
      if (!text || text.length < 2) { showBubble('No text captured yet!'); return }

      selToolbar.classList.remove('show')
      clearTimeout(toolbarTimeout)

      const titles = { read: '📖 Reading', fix: '🔧 Fixing Code', explain: '💡 Explaining' }
      modalTitle.textContent = titles[mode] || 'Aibo'
      modalModel.textContent = ''
      modalSel.textContent   = text.length > 300 ? text.slice(0, 300) + '…' : text
      modalResp.className    = 'modal-response'
      modalResp.innerHTML    = `<div class="modal-loading"><div class="dots"><span></span><span></span><span></span></div><span>Thinking...</span></div>`

      openModal()
      setState('thinking')
      showBubble('On it...', 10000)

      let result
      try {
        result = await window.aibo.askOllama(mode, text)
        console.log('[Aibo] Result ok:', result?.ok)
      } catch(e) {
        result = { ok: false, error: e.message }
      }

      if (result && result.ok) {
        const isCode = mode === 'fix' || (mode === 'explain' && looksLikeCode(text))
        modalResp.className   = 'modal-response' + (isCode ? ' code' : '')
        modalResp.textContent = result.reply
        modalModel.textContent = `via ${result.model}`
        setState('speaking')
        setTimeout(() => setState('idle'), 3000)
        if (mode === 'fix') {
          window.aibo.writeClipboard(result.reply)
          showBubble('Fixed! Ctrl+V to paste', 4000)
        }
      } else {
        modalResp.className   = 'modal-response'
        modalResp.textContent = result?.error || 'Something went wrong'
        setState('idle')
      }
    }

    async function runAnswer(text) {
      if (!text || text.length < 2) { showBubble('No text captured yet!'); return }
      selToolbar.classList.remove('show')
      clearTimeout(toolbarTimeout)
      setState('thinking')
      showBubble('Thinking...', 10000)

      let result
      try {
        result = await window.aibo.askOllama('chat', `Answer this question concisely in 1-3 sentences: ${text}`)
      } catch(e) { result = { ok: false, error: e.message } }

      if (result && result.ok) {
        setState('speaking')
        showResponseBubble('💬 Aibo', result.reply, `via ${result.model}`)
        // Speak the response
        window.aibo.speak(result.reply)
        setTimeout(() => setState('idle'), 2000)
      } else {
        showBubble('Could not get answer', 3000)
        setState('idle')
      }
    }

    async function runSearch(query) {
      if (!query || query.length < 2) { showBubble('No text captured yet!'); return }
      selToolbar.classList.remove('show')
      clearTimeout(toolbarTimeout)
      setState('thinking')
      showBubble('Searching...', 10000)

      let searchResult
      try { searchResult = await window.aibo.webSearch(query) }
      catch(e) { searchResult = { ok: false } }

      if (searchResult && searchResult.ok && searchResult.answer) {
        setState('speaking')
        showResponseBubble('🔍 Web Answer', searchResult.answer, searchResult.source)
        window.aibo.speak(searchResult.answer)
        setTimeout(() => setState('idle'), 2000)
      } else {
        let result
        try {
          result = await window.aibo.askOllama('chat', `Answer based on what you know: "${query}"`)
        } catch(e) { result = { ok: false } }

        if (result && result.ok) {
          setState('speaking')
          showResponseBubble('🔍 Aibo Search', result.reply, `via ${result.model}`)
          window.aibo.speak(result.reply)
          setTimeout(() => setState('idle'), 2000)
        } else {
          showBubble('Search failed', 3000)
          setState('idle')
        }
      }
    }

    function looksLikeCode(text) {
      return /[{};()=>]|def |function |import |class |const |let |var |return /.test(text)
    }

    function positionTaskPanel() {

    // Build human-readable preview of a parsed task
    function buildPreviewHTML(task) {
      const icons = { email: '📧', file: '📁', calendar: '📅', browser: '🌐', unknown: '❓' }
      const icon  = icons[task.type] || '❓'
      let html = `<div style="margin-bottom:6px;font-weight:600;color:var(--orb-glow)">${icon} ${task.type.toUpperCase()}</div>`

      if (task.type === 'email') {
        html += `<div><span style="color:var(--text-muted)">To:</span> ${task.to || '?'}</div>`
        html += `<div><span style="color:var(--text-muted)">Subject:</span> ${task.subject || '?'}</div>`
        html += `<div style="margin-top:6px;padding:8px;background:var(--surface);border-radius:6px;font-size:12px;">${task.body || ''}</div>`
      } else if (task.type === 'file') {
        html += `<div><span style="color:var(--text-muted)">Action:</span> ${task.action}</div>`
        html += `<div><span style="color:var(--text-muted)">Path:</span> ${task.path || '?'}</div>`
        if (task.content) html += `<div style="margin-top:6px;padding:8px;background:var(--surface);border-radius:6px;font-size:12px;">${task.content.slice(0, 100)}</div>`
      } else if (task.type === 'calendar') {
        html += `<div><span style="color:var(--text-muted)">Event:</span> ${task.title}</div>`
        html += `<div><span style="color:var(--text-muted)">Date:</span> ${task.date} at ${task.time || '09:00'}</div>`
        html += `<div><span style="color:var(--text-muted)">Duration:</span> ${task.duration || 60} min</div>`
      } else if (task.type === 'browser') {
        html += `<div><span style="color:var(--text-muted)">Action:</span> ${task.action}</div>`
        html += `<div><span style="color:var(--text-muted)">URL:</span> ${task.url || task.query || '?'}</div>`
      } else {
        html += `<div style="color:#f09b7a">Could not understand task. Try rephrasing.</div>`
      }

      const conf = Math.round((task.confidence || 0) * 100)
      html += `<div style="margin-top:8px;font-size:11px;color:var(--text-muted)">Confidence: ${conf}%</div>`
      return html
    }

    // Parse task button
    document.getElementById('task-parse-btn').addEventListener('click', async () => {

    async function sendChatMessage(text) {
      if (!text.trim()) return
      chatInput.value = ''

      // Add user message to UI and history
      addChatMessage('user', text)
      chatHistory.push({ role: 'user', content: text })

      // Show typing indicator
      addTypingIndicator()
      setState('thinking')

      // Build clean conversation history
      const recentMessages = chatHistory
        .filter(m => m.role === 'user' || m.role === 'aibo')
        .slice(-16)

      const dialogue = recentMessages
        .map(m => `${m.role === 'user' ? userName : 'Aibo'}: ${m.content}`)
        .join('\n')

      // Strict anti-repetition prompt
      // The [INST] tags help Mistral understand this is an instruction not dialogue
      const prompt = dialogue.length > 0
        ? `${dialogue}\nAibo (respond naturally, never repeat what was just said, be brief):`
        : text

      let result
      try {
        result = await window.aibo.askOllama('chat', prompt)
      } catch(e) {
        result = { ok: false, error: e.message }
      }

      // Remove typing indicator
      document.getElementById('chat-typing')?.remove()

      if (result && result.ok) {
        let reply = result.reply

        // Strip filler openers
        reply = reply
          .replace(/^(Certainly|Absolutely|Great|Sure|Of course|I'd be happy|I understand|I see)[^.!?]*[.!?]\s*/i, '')
          .replace(/^(Hey|Hi|Hello)\s+\w+[,!]?\s*/i, '') // strip "Hey Goldie," etc
          .replace(/^\d+\.\s+/gm, '')   // remove numbered lists
          .replace(/^[-•*]\s+/gm, '')   // remove bullets
          .trim()

        // Strip if Aibo literally repeated the last user message
        const lastUserMsg = chatHistory
          .filter(m => m.role === 'user')
          .slice(-1)[0]?.content || ''

        if (lastUserMsg.length > 10 && reply.toLowerCase().startsWith(lastUserMsg.toLowerCase().slice(0, 30))) {
          reply = reply.slice(lastUserMsg.length).trim()
        }

        if (!reply) reply = 'Yeah.' // fallback if everything got stripped

        chatHistory.push({ role: 'aibo', content: reply })
        addChatMessage('aibo', reply)
        expandChatForReply()
        window.aibo.speak(reply)
        setState('speaking')
        setTimeout(() => setState('idle'), 3000)
      } else {
        addChatMessage('aibo', 'Something went wrong — try again')
        expandChatForReply()
        setState('idle')
      }

      positionChatBubble()
    }

      recognition = new SpeechRecognition()

        isRecording = true
        chatVoiceBtn.classList.add('recording')

      recognition.onresult = e => {

          .join('')
        chatInput.value = transcript
        chatVoiceStat.textContent = transcript.length > 40
          ? transcript.slice(0, 40) + '...'
          : transcript

      recognition.onend = () => {
        isRecording = false
        chatVoiceBtn.classList.remove('recording')
        chatVoiceStat.textContent = ''
        chatInput.placeholder = 'Talk to Aibo...'

        const text = chatInput.value.trim()
        if (text) sendChatMessage(text)

      recognition.onerror = e => {
        isRecording = false
        chatVoiceBtn.classList.remove('recording')
        chatVoiceStat.textContent = 'Could not hear you — try again'
        setTimeout(() => chatVoiceStat.textContent = '', 2000)

      // Poll voice server until it responds, then speak
      let attempts = 0
      const maxAttempts = 20 // try for up to 20 seconds

      const poll = async () => {
        attempts++
        try {
          const result = await window.aibo.speak(greeting)
          if (result && result.ok) {
            console.log('[Aibo] Greeting spoken after', attempts, 'attempt(s)')
            return
          }
        } catch(e) {}

        if (attempts < maxAttempts) {
          setTimeout(poll, 1000) // retry every second
        } else {
          console.log('[Aibo] Voice server did not respond — greeting skipped')
        }
      }

      // Start polling after 2 seconds
      setTimeout(poll, 2000)
    }

    // Only greet and animate on primary display
    // Wait a bit for onDesktopBounds to fire first (100ms is enough)
    setTimeout(() => {
      if (isPrimaryDisplay) {
        waitForVoiceAndGreet()
      } else {
        console.log('[Aibo] Secondary display — skipping greeting')
      }
    }, 200)

    console.log('[Aibo] Ready — running in system tray')
  </script>
</body>
</html>
